auth:
  api_keys:
    - "sk-XXXXXXXXXXXX"

webhook:
  bind: "0.0.0.0:8000"
  work_dir: "/data/acme-git-webhook"
  ssh_key: "/run/secrets/deploy_key"

repo:
  url: "git@github.com:org/dns-zones.git"
  branch: "main"
  zone_path: "zones"
  zone_file_suffix: ".zone"

vault:
  addr: "https://vault.example.com:8200"
  role_id: "xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx"
  secret_id_path: "/run/secrets/vault_secret_id"
  kv_mount: "secret"
  certs_path: "certs"
  verify: true
  skip: false
