apiVersion: v1
kind: Secret
metadata:
  name: webhook
type: Opaque
stringData:
  # Replace with a strong random value — must match the api_key in config.yaml
  api_key: "changeme-acme-webhook-api-key"

  # SSH deploy key with write access to the DNS zones repository
  # Generate: ssh-keygen -t ed25519 -f deploy_key -N ""
  deploy_key: |
    -----BEGIN OPENSSH PRIVATE KEY-----
    changeme
    -----END OPENSSH PRIVATE KEY-----

  # Vault AppRole secret_id (file content mounted at secret_id_path)
  vault_secret_id: "changeme-vault-secret-id"

  # F5 Big-IP password (file content mounted at password_path)
  f5_password: "changeme-f5-password"
