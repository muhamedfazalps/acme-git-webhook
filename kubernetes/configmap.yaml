apiVersion: v1
kind: ConfigMap
metadata:
  name: config
data:
  config.yaml: |
    auth:
      api_keys:
        - "${ACME_WEBHOOK_API_KEY}"

    webhook:
      work_dir: "/data/acme-git-webhook/work"

    repo:
      url: "git@github.com:your-org/dns-zones.git"
      branch: "main"
      zone_path: "zones"
      zone_file_suffix: ".zone"

    vault:
      addr: "https://vault.example.com:8200"
      role_id: "xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx"
      secret_id_path: "/run/secrets/vault_secret_id"
      kv_mount: "secret"
      certs_path: "certs"
      verify: true
      skip: false

    dns:
      nameservers:
        - "8.8.8.8"
        - "1.1.1.1"
      timeout: 120
      poll_interval: 5
      wait_for_propagation: true

    f5:
      hosts:
        - addr: "https://bigip.example.com"
          username: "admin"
          password_path: "/run/secrets/f5_password"
          verify: true

    monitor:
      check_interval_hours: 24
      warn_days: [60, 30, 14, 7, 3, 1]
      alert_webhook_url: null
      renew_command: >
        certbot renew --cert-name {domain}
        --server https://emea.acme.atlas.globalsign.com/directory
        --deploy-hook /opt/deploy-hook.sh
        --config-dir /data/acme-git-webhook/letsencrypt
        --work-dir /tmp/certbot-work
        --logs-dir /tmp/certbot-logs
      renew_timeout: 300
      renew_threshold: 14
