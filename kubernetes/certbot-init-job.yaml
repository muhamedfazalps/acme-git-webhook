# One-time Job to register the ACME account with GlobalSign Atlas.
#
# Requires External Account Binding (EAB) credentials generated from
# the Atlas portal: API Credentials → Request an ACME MAC.
#
# After the Job completes successfully, you can delete it.
#   kubectl apply -f certbot-init-job.yaml
#   kubectl logs job/acme-certbot-init
#   kubectl delete -f certbot-init-job.yaml
#
# Subsequent certificate renewals are handled automatically by the
# webhook's scheduler via the renew_command in config.yaml.

apiVersion: batch/v1
kind: Job
metadata:
  name: certbot-init
spec:
  template:
    spec:
      restartPolicy: Never
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: data

      containers:
        - name: certbot
          image: ghcr.io/ckyvra/acme-git-webhook:latest
          command:
            - /bin/bash
            - /app/scripts/register-acme.sh
          args:
            - "<your-eab-kid>"
            - "<your-eab-hmac-key>"
            - "admin@example.com"

          env:
            - name: GIT_SSH_COMMAND
              value: "ssh -i /run/secrets/deploy_key -o StrictHostKeyChecking=no"

          volumeMounts:
            - name: data
              mountPath: /data/acme-git-webhook
