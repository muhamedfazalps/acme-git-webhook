apiVersion: apps/v1
kind: Deployment
metadata:
  name: webhook
spec:
  replicas: 1
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app.kubernetes.io/component: webhook
    spec:
      volumes:
        - name: config
          configMap:
            name: config
        - name: data
          persistentVolumeClaim:
            claimName: data
        - name: deploy-key
          secret:
            secretName: webhook
            items:
              - key: deploy_key
                path: deploy_key
                mode: 0400
        - name: vault-secret-id
          secret:
            secretName: webhook
            items:
              - key: vault_secret_id
                path: vault_secret_id
                mode: 0400
        - name: f5-password
          secret:
            secretName: webhook
            items:
              - key: f5_password
                path: f5_password
                mode: 0400

      containers:
        - name: webhook
          image: ghcr.io/ckyvra/acme-git-webhook:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
              name: http
              protocol: TCP

          env:
            - name: CONFIG_PATH
              value: /app/config.yaml
            - name: ACME_WEBHOOK_API_KEY
              valueFrom:
                secretKeyRef:
                  name: webhook
                  key: api_key
            - name: ACME_WEBHOOK_URL
              value: http://localhost:8000
            # SSH for Git — use the mounted deploy key
            - name: GIT_SSH_COMMAND
              value: "ssh -i /run/secrets/deploy_key -o StrictHostKeyChecking=no"

          volumeMounts:
            - name: config
              mountPath: /app/config.yaml
              subPath: config.yaml
            - name: data
              mountPath: /data/acme-git-webhook
            - name: deploy-key
              mountPath: /run/secrets/deploy_key
              subPath: deploy_key
            - name: vault-secret-id
              mountPath: /run/secrets/vault_secret_id
              subPath: vault_secret_id
            - name: f5-password
              mountPath: /run/secrets/f5_password
              subPath: f5_password

          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 30

          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10

          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
